<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Organizer — Local AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: 8px 10px;
      border-bottom: 1px solid #1f2937;
      flex-shrink: 0;
      gap: 6px;
    }

    h1 {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
    }

    .controls { display: flex; flex-wrap: wrap; gap: 8px; }

    button {
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid #374151;
      background: #1f2937;
      color: #d1d5db;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      font-weight: 500;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    button:hover:not(:disabled) { background: #374151; }
    button:disabled { opacity: 0.45; cursor: default; }
    button.primary { background: #4f46e5; border-color: #4338ca; color: #fff; }
    button.primary:hover:not(:disabled) { background: #4338ca; }
    #load-model-btn { flex: 1 1 100%; }
    #resume-btn { flex: 1; }
    #open-btn { flex: 1; }

    /* ── Progress bar ── */
    #progress-wrap { height: 2px; background: #1f2937; flex-shrink: 0; }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4f46e5, #818cf8);
      width: 0%;
      transition: width 0.25s ease;
    }

    /* ── Status ── */
    #status {
      padding: 10px 14px;
      font-size: 13px;
      color: #9ca3af;
      flex-shrink: 0;
      min-height: 32px;
      display: flex;
      align-items: center;
      line-height: 1.4;
    }

    /* ── Canvas area ── */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    canvas { display: block; width: 100%; height: 100%; cursor: grab; touch-action: none; }
    canvas:active { cursor: grabbing; }

    /* ── Search panel ── */
    #search-panel {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0d1117;
      border-top: 1px solid #1f2937;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #search-panel button { flex: 0 0 auto; padding: 6px 10px; min-height: 32px; font-size: 12px; }
    #search-panel input {
      flex: 1;
      min-width: 140px;
      padding: 10px 12px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #e5e7eb;
      font-size: 14px;
      outline: none;
      min-height: 40px;
    }
    #search-panel input:disabled { cursor: not-allowed; color: #6b7280; }
    .badge {
      font-size: 12px;
      color: #6b7280;
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 4px 10px;
      white-space: nowrap;
      font-weight: 500;
    }

    /* ── Modal ── */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #modal.open { display: flex; }
    #modal-content {
      background: #1f2937;
      border-radius: 12px;
      max-width: 92vw;
      max-height: 92dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #modal-img {
      flex: 1;
      min-height: 0;
      max-height: calc(92dvh - 60px);
      width: 100%;
      object-fit: contain;
      background: #0d1117;
    }
    #modal-name {
      padding: 12px 16px;
      font-size: 14px;
      color: #d1d5db;
      border-top: 1px solid #374151;
      white-space: pre-wrap;
      word-break: break-all;
      overflow-y: auto;
      max-height: 80px;
    }
    #modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: #1f2937;
      border: 1px solid #374151;
      color: #d1d5db;
      width: 40px;
      height: 40px;
      border-radius: 6px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

<header>
  <h1>Photo Organizer</h1>
  <div class="controls">
    <button id="load-model-btn" class="primary">Load Model (~514 MB, cached after first load)</button>
    <button id="resume-btn" hidden disabled>Resume last session</button>
    <button id="open-btn" disabled>Open Folder</button>
  </div>
</header>

<div id="progress-wrap"><div id="progress-bar"></div></div>
<div id="status">Pick a folder of images to begin.</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<div id="search-panel">
  <button id="recenter-btn" disabled>⌖ Recenter</button>
  <button id="reset-btn" disabled>Reset</button>
  <input id="search-input" disabled placeholder="e.g. sunset at the beach">
  <button id="search-clear-btn" hidden>✕</button>
</div>

<div id="modal">
  <button id="modal-close">✕</button>
  <div id="modal-content">
    <img id="modal-img" alt="">
    <div id="modal-name"></div>
  </div>
</div>

<script src="/umap-js.min.js"></script>
<script type="module" src="/src/app.ts"></script>
</body>
</html>
