name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - '**' # Run on all branches for previews and production

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'media-clusterer' # Note: Make sure this matches your project name in Cloudflare
          directory: 'dist'
          wranglerVersion: '3'
          # Optional: Cloudflare Pages automatically handles branch names.
          # Pushes to `main` go to production, everything else gets a preview URL.
