name: test

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv install.sh | sh

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: uvx pnpm install

      - name: Run vitest
        run: uvx pnpm test
