name: CI/CD - Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run type-check

      - name: Run Tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: npx wrangler pages deploy dist --project-name media-clusterer --branch "$DEPLOY_BRANCH"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: de11927c1b728c9897c960abbe336098
          DEPLOY_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Update GitHub deployment status
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.head_ref }}
        run: |
          BRANCH_URL="https://${PR_BRANCH}.media-clusterer.pages.dev"

          # Set deployment status via GitHub API
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/deployments \
            -f ref="$PR_BRANCH" \
            -f environment="preview" \
            -f description="Deployed to Cloudflare Pages" \
            -f environment_url="$BRANCH_URL" \
            -f auto_inactive=true \
            -f required_contexts="[]"

          # Comment on PR with deployment URL
          gh pr comment "$PR_NUMBER" --body "🚀 **Deployed preview:** $BRANCH_URL" || true
